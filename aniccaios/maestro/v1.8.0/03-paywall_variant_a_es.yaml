# Test 3: Paywall Variant A — Spanish
# Verifies: ES localization on Variant A paywall

appId: ai.anicca.app.ios
name: Paywall Variant A ES
tags:
  - paywall
  - v1.8.0
  - variant-a
  - es

---
- clearState
- clearKeychain
- launchApp:
    arguments:
      UITESTING: "true"
      AppleLanguages: "(es)"
      AppleLocale: "es_ES"
    env:
      PAYWALL_VARIANT: "control"

- runFlow: ../_onboarding_to_paywall.yaml

- extendedWaitUntil:
    visible:
      id: "paywall-plan-cta"
    timeout: 15000

- takeScreenshot: "v180-03-variant-a-es"

- assertVisible:
    id: "paywall-dismiss"
- assertVisible:
    id: "paywall-maybe-later"

# Dismiss
- tapOn:
    id: "paywall-dismiss"

- tapOn:
    text: "今はしない|Not Now|Ahora no"
    optional: true

- extendedWaitUntil:
    visible:
      id: "mypath-root"
    timeout: 10000

- takeScreenshot: "v180-03-variant-a-es-home"
