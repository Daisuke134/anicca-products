# E2E: Seed APNs-delivery snapshot -> open via deep link -> show Nudge Card
#
# This avoids Notification Center UI (flaky) and instead verifies:
# - internal seeding endpoint works
# - iOS can fetch /mobile/nudge/delivery/:id
# - NudgeCardView renders
#
# Requires:
# - app launched with -uiTesting (stable device-id)
# - INTERNAL_API_TOKEN env set for the maestro process

appId: ai.anicca.app.ios
name: E2E APNs problem nudge card (seed + deep link)
tags:
  - e2e
  - apns

---
- clearState
- clearKeychain
- launchApp:
    arguments:
      - "-uiTesting"

# Onboarding (minimal path)
- extendedWaitUntil:
    visible:
      id: "onboarding-welcome-cta"
    timeout: 30000
- tapOn:
    id: "onboarding-welcome-cta"

- extendedWaitUntil:
    visible:
      id: "onboarding-struggle-anxiety"
    timeout: 15000
- tapOn:
    id: "onboarding-struggle-anxiety"
- tapOn:
    id: "onboarding-struggles-next"

- extendedWaitUntil:
    visible:
      id: "live_demo_trigger_button"
    timeout: 15000
- tapOn:
    id: "live_demo_trigger_button"
- extendedWaitUntil:
    visible:
      id: "nudge-card-view"
    timeout: 5000
- tapOn:
    id: "nudge-primary-action"

- extendedWaitUntil:
    visible:
      id: "onboarding-notifications-allow"
    timeout: 15000
- tapOn:
    id: "onboarding-notifications-allow"
- tapOn:
    text: "許可|Allow"
    optional: true

# Paywall may appear; dismiss to reach MyPath
- tapOn:
    id: "paywall-close-button"
    optional: true

- extendedWaitUntil:
    visible:
      id: "mypath-root"
    timeout: 15000

# Seed + open delivery via deep link
- runScript:
    file: "../../../scripts/maestro_seed_problem_delivery_and_open.sh"

# Verify Nudge Card displayed
- extendedWaitUntil:
    visible:
      id: "nudge-card-view"
    timeout: 15000

- takeScreenshot: "e2e-apns-problem-nudge-card"
