# E2E setup: clear state, finish onboarding, open E2E Notifications debug panel.
# Use this before enqueuing send_nudge so we can read the current simulator Device ID.

appId: ai.anicca.app.ios
name: E2E open E2E Notifications (setup)
tags:
  - e2e
  - notification

---
- clearState
- clearKeychain
- launchApp

# Onboarding (same path as 04)
- extendedWaitUntil:
    visible:
      id: "onboarding-welcome-cta"
    timeout: 30000
- tapOn:
    id: "onboarding-welcome-cta"

- extendedWaitUntil:
    visible:
      id: "onboarding-struggle-staying_up_late"
    timeout: 15000
- tapOn:
    id: "onboarding-struggle-staying_up_late"
- tapOn:
    id: "onboarding-struggles-next"

- extendedWaitUntil:
    visible:
      id: "live_demo_trigger_button"
    timeout: 15000
- tapOn:
    id: "live_demo_trigger_button"
- extendedWaitUntil:
    visible:
      id: "nudge-card-view"
    timeout: 5000
- tapOn:
    id: "nudge-primary-action"

- extendedWaitUntil:
    visible:
      id: "onboarding-notifications-allow"
    timeout: 15000
- tapOn:
    id: "onboarding-notifications-allow"
- tapOn:
    text: "許可|Allow"
    optional: true

# Paywall may appear; dismiss to reach MyPath
- tapOn:
    id: "paywall-close-button"
    optional: true

- extendedWaitUntil:
    visible:
      id: "mypath-root"
    timeout: 15000

# Dismiss iOS review prompt if it appears
- tapOn:
    text: "今はしない|Not Now"
    optional: true

# Open E2E debug panel
- swipe:
    direction: UP
- swipe:
    direction: UP
- swipe:
    direction: UP
- swipe:
    direction: UP
- swipe:
    direction: UP
- swipe:
    direction: UP
- swipe:
    direction: UP
- swipe:
    direction: UP
- swipe:
    direction: UP
- swipe:
    direction: UP
- swipe:
    direction: UP
- swipe:
    direction: UP

- extendedWaitUntil:
    visible:
      id: "debug-e2e-notification"
    timeout: 15000
- tapOn:
    id: "debug-e2e-notification"

- extendedWaitUntil:
    visible:
      id: "e2e-notif-title"
    timeout: 10000

- tapOn:
    id: "e2e-request-notif-permission"
- tapOn:
    text: "許可|Allow"
    optional: true
- tapOn:
    id: "e2e-clear-pending"

- takeScreenshot: "e2e-open-e2e-notifications"

