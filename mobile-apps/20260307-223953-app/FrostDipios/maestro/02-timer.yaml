# Feature: Timer start and breathing prep
# Tests: Skip onboarding → Start breathing prep → Skip → Timer runs → Pause → Stop
# Dependencies: Fresh install

appId: com.aniccafactory.frostdip
tags:
  - timer

---
- clearState
- clearKeychain
- launchApp

# Skip onboarding quickly
- extendedWaitUntil:
    visible:
      id: "onboarding_get_started"
    timeout: 30000

- tapOn:
    id: "onboarding_get_started"

- extendedWaitUntil:
    visible:
      id: "onboarding_experience_beginner"
    timeout: 10000

- tapOn:
    id: "onboarding_experience_beginner"

- tapOn:
    id: "onboarding_continue"

- extendedWaitUntil:
    visible:
      id: "onboarding_skip_notifications"
    timeout: 10000

- tapOn:
    text: "Allow"
    optional: true

- tapOn:
    id: "onboarding_skip_notifications"

- extendedWaitUntil:
    visible:
      id: "paywall_maybe_later"
    timeout: 10000

- tapOn:
    id: "paywall_maybe_later"

# Timer screen
- extendedWaitUntil:
    visible:
      id: "timer_start"
    timeout: 30000

# Start breathing prep
- tapOn:
    id: "timer_breathing_prep"

- extendedWaitUntil:
    visible:
      id: "breathing_skip"
    timeout: 10000

# Skip breathing and go to timer
- tapOn:
    id: "breathing_skip"

# Timer should be running
- extendedWaitUntil:
    visible:
      id: "timer_pause"
    timeout: 10000

# Pause
- tapOn:
    id: "timer_pause"

- extendedWaitUntil:
    visible:
      id: "timer_start"
    timeout: 5000

# Stop
- tapOn:
    id: "timer_stop"

# Back to idle - Start button visible
- extendedWaitUntil:
    visible:
      id: "timer_start"
    timeout: 5000

- assertVisible:
    id: "timer_breathing_prep"

- takeScreenshot: "02-timer-complete"
