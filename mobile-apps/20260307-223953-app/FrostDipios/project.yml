name: FrostDip
options:
  bundleIdPrefix: com.aniccafactory
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  knownRegions:
    - en
    - ja
  defaultLocalization: en

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: GCVGP8K25Q
    CODE_SIGN_STYLE: Automatic

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios.git
    from: "5.0.0"

targets:
  FrostDip:
    type: application
    platform: iOS
    sources:
      - FrostDip
    configFiles:
      Debug: FrostDip/Config/Debug.xcconfig
      Release: FrostDip/Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aniccafactory.frostdip
        INFOPLIST_FILE: FrostDip/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    dependencies:
      - package: RevenueCat
        product: RevenueCat
    entitlements:
      path: FrostDip/FrostDip.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records

  FrostDipTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FrostDipTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: FrostDip
