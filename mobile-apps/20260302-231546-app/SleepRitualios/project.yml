name: SleepRitual
options:
  bundleIdPrefix: com.anicca
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: 5.0.0
  Mixpanel:
    url: https://github.com/mixpanel/mixpanel-swift
    from: 4.0.0

targets:
  SleepRitual:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SleepRitual
        excludes:
          - "**/*.xcassets"
      - path: SleepRitual/Resources/Assets.xcassets
        type: folder
    info:
      path: SleepRitual/Info.plist
      properties:
        CFBundleDisplayName: SleepRitual
        CFBundleIdentifier: com.anicca.sleepritual
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        NSUserNotificationUsageDescription: "We'll remind you when it's time for your sleep ritual."
        RevenueCatAPIKey: "appl_UJhanZogxfPVJwWoPefUILUaoiz"
        MixpanelToken: "96835bddc4fd0f2613e805d98c5915cd"
    entitlements:
      path: SleepRitual/SleepRitual.entitlements
      properties:
        com.apple.developer.in-app-payments: []
    dependencies:
      - package: RevenueCat
        product: RevenueCat
      - package: Mixpanel
        product: Mixpanel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anicca.sleepritual
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: S5U8UH3JLJ
        CODE_SIGN_STYLE: Automatic
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"

  SleepRitualTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SleepRitualTests
    dependencies:
      - target: SleepRitual
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SleepRitual.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SleepRitual"
