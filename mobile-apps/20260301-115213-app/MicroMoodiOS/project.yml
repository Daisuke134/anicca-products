name: MicroMoodiOS
options:
  bundleIdPrefix: com.anicca
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: S5U8UH3JLJ
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Distribution"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0.0"

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  Mixpanel:
    url: https://github.com/mixpanel/mixpanel-swift
    from: "4.0.0"

targets:
  MicroMoodiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
        excludes: []
      - path: Views
        excludes: []
      - path: Models
        excludes: []
      - path: Services
        excludes: []
      - path: ViewModels
        excludes: []
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/MicroMoodCoreData.xcdatamodeld
        buildPhase: sources
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        NSHealthShareUsageDescription: "Micro Mood writes your mood as mindfulness sessions to Apple Health."
        NSHealthUpdateUsageDescription: "Micro Mood writes your mood as mindfulness sessions to Apple Health."
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anicca.micromood
        INFOPLIST_KEY_CFBundleDisplayName: "Micro Mood"
        PROVISIONING_PROFILE_SPECIFIER: "MicroMood AppStore 2026"
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
      - package: Mixpanel
        product: Mixpanel
      - sdk: HealthKit.framework

  MicroMoodiOSWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Widget
    resources:
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anicca.micromood.widget
        INFOPLIST_KEY_CFBundleDisplayName: "Micro Mood Widget"
        DEVELOPMENT_TEAM: S5U8UH3JLJ
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        GENERATE_INFOPLIST_FILE: YES

  MicroMoodiOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - MicroMoodiOSTests
    dependencies:
      - target: MicroMoodiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anicca.micromood.tests
        DEVELOPMENT_TEAM: S5U8UH3JLJ
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
