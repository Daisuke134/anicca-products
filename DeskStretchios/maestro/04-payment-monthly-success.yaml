appId: com.aniccafactory.deskstretch
name: Payment Monthly Success
tags:
  - payment
  - smokeTest
---
- clearState
- clearKeychain
- launchApp

- tapOn:
    text: "キャンセル|Cancel"
    optional: true

- extendedWaitUntil:
    visible:
      id: "onboarding_get_started"
    timeout: 30000

- tapOn:
    id: "onboarding_get_started"

- extendedWaitUntil:
    visible:
      id: "pain_area_neck"
    timeout: 10000

- tapOn:
    id: "pain_area_neck"

- tapOn:
    id: "onboarding_continue"

- extendedWaitUntil:
    visible:
      id: "paywall_plan_monthly"
    timeout: 30000

- tapOn:
    id: "paywall_plan_monthly"

- extendedWaitUntil:
    visible: "Simulate Success"
    timeout: 10000

- tapOn: "Simulate Success"

- extendedWaitUntil:
    visible:
      id: "timer_countdown"
    timeout: 10000

- takeScreenshot: "04-payment-monthly-success"
