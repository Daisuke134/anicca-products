appId: com.aniccafactory.deskstretch
name: Payment Failure
tags:
  - payment
---
- clearState
- clearKeychain
- launchApp

- tapOn:
    text: "キャンセル|Cancel"
    optional: true

- extendedWaitUntil:
    visible:
      id: "onboarding_get_started"
    timeout: 30000

- tapOn:
    id: "onboarding_get_started"

- extendedWaitUntil:
    visible:
      id: "pain_area_neck"
    timeout: 10000

- tapOn:
    id: "pain_area_neck"

- tapOn:
    id: "onboarding_continue"

- extendedWaitUntil:
    visible:
      id: "paywall_plan_monthly"
    timeout: 30000

- tapOn:
    id: "paywall_plan_monthly"

- extendedWaitUntil:
    visible: "Test failed purchase"
    timeout: 10000

- tapOn: "Test failed purchase"

- extendedWaitUntil:
    visible:
      id: "paywall_plan_monthly"
    timeout: 5000

- takeScreenshot: "06-payment-failure"
