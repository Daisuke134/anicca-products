name: DeskStretch
options:
  bundleIdPrefix: com.aniccafactory
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios.git
    from: 5.0.0
targets:
  DeskStretch:
    type: application
    platform: iOS
    sources:
      - DeskStretch
    resources:
      - DeskStretch/Resources
    settings:
      base:
        INFOPLIST_FILE: DeskStretch/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.aniccafactory.deskstretch
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: TM3HR9L4R6
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: RevenueCat
        product: RevenueCat
  DeskStretchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DeskStretchTests
    dependencies:
      - target: DeskStretch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aniccafactory.deskstretch.tests
        GENERATE_INFOPLIST_FILE: YES
